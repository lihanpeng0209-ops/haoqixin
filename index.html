  {y:2025,m:10,d:20,name:"彼得·内米亚·伊索艾莫",cn:"巴布亚新几内亚",title:"能源部部长",role:"minister",purpose:"business",place:"能源变革论坛·协鑫等能源企业",lat:31.320,lng:120.715,note:"出席能源变革论坛。",news:[],photo:null},
  {y:2025,m:10,d:20,name:"杰里米·马克·波克林顿",cn:"英国",title:"能源安全与净零排放部常务次官",role:"minister",purpose:"business",place:"能源变革论坛·协鑫等能源企业",lat:31.320,lng:120.715,note:"出席能源变革论坛。英国能源高官深度考察苏州新能源产业链。",news:[],photo:null},
  {y:2025,m:10,d:20,name:"年吞",cn:"缅甸",title:"电力部联邦部长",role:"minister",purpose:"business",place:"能源变革论坛·协鑫等能源企业",lat:31.320,lng:120.715,note:"出席能源变革论坛。",news:[],photo:null},
  {y:2025,m:11,d:3,name:"赛尔米拉·萨克拉门托",cn:"圣多美和普林西比",title:"国民议会议长",role:"minister",purpose:"mixed",place:"园区展示中心、金庭镇",lat:31.324,lng:120.733,note:"非洲葡语国家议会代表团。从产业高地到太湖生态岛金庭镇。",news:[],photo:null},
  {y:2025,m:12,d:18,name:"巴希勒",cn:"阿曼",title:"文体青部次大臣",role:"minister",purpose:"mixed",place:"园区展示中心、亨通、山塘街",lat:31.324,lng:120.733,note:"阿曼青年精英访华团。参观亨通集团及古城山塘街。",news:[],photo:null},
];
visits.sort((a,b)=>a.y-b.y||(a.m||0)-(b.m||0));

// ========== MAP ==========
const map = L.map('map',{zoomControl:false}).setView([31.32, 120.68], 10);
L.control.zoom({position:'bottomright'}).addTo(map);
L.control.attribution({position:'bottomleft',prefix:''}).addAttribution('&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>').addTo(map);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

const roleColors = {head:'#4fc3f7',royal:'#81c784',minister:'#ffb74d'};
const markers=[], markerGroup=L.layerGroup().addTo(map);

visits.forEach((v,i)=>{
  const m = L.circleMarker([v.lat,v.lng],{radius:8,fillColor:roleColors[v.role],color:'#fff',weight:1.5,fillOpacity:0.9});
  const ds = v.d?`${v.y}/${v.m}/${v.d}`:(v.m?`${v.y}/${v.m}`:`${v.y}`);
  const purposeLabel = {cultural:'园林文化',mixed:'混合参访',business:'产业经贸'}[v.purpose];
  let html = `<b>${v.name}</b> <span style="font-size:10px;padding:1px 6px;border-radius:6px;background:${purposeLabel==='产业经贸'?'#ef5350':purposeLabel==='园林文化'?'#81c784':'#ffb74d'};color:#000">${purposeLabel}</span><br>${v.cn} · ${v.title}<br>${ds}<br>📍 ${v.place}`;
  if(v.note) html += `<br><small style="color:#8899aa">${v.note}</small>`;
  if(v.news&&v.news.length) html += `<br>${v.news.map(n=>n.url?`<a href="${n.url}" target="_blank" style="font-size:10px;color:#ffb74d">📰 ${n.label}</a>`:`<span style="font-size:10px;color:#6b8299">📰 ${n.label}</span>`).join(' ')}`;
  m.bindPopup(html,{maxWidth:260});
  m._idx=i; m.on('click',()=>highlightVisit(i));
  markerGroup.addLayer(m); markers.push(m);
});

// Heatmap
const heatData = visits.map(v=>[v.lat,v.lng,1]);
const heatLayer = L.heatLayer(heatData,{radius:25,blur:16,maxZoom:12,max:3,gradient:{0.2:'#4fc3f7',0.5:'#81c784',0.8:'#ffb74d',1:'#ef5350'}}).addTo(map);
let showHeat=true,showMarkers=true;
function updateHeatmap(f){map.removeLayer(window._currentHeat||heatLayer);const d=f.map(v=>[v.lat,v.lng,1]);window._currentHeat=L.heatLayer(d,{radius:25,blur:16,maxZoom:12,max:3,gradient:{0.2:'#4fc3f7',0.5:'#81c784',0.8:'#ffb74d',1:'#ef5350'}});if(showHeat)window._currentHeat.addTo(map)}
document.getElementById('btn-heat').addEventListener('click',function(){showHeat=!showHeat;if(showHeat){window._currentHeat.addTo(map);this.classList.add('active');this.textContent='热力图'}else{map.removeLayer(window._currentHeat);this.classList.remove('active');this.textContent='热力图'}});
document.getElementById('btn-markers').addEventListener('click',function(){showMarkers=!showMarkers;if(showMarkers){markerGroup.addTo(map);this.classList.add('active');this.textContent='标记'}else{map.removeLayer(markerGroup);this.classList.remove('active');this.textContent='标记'}});
document.getElementById('btn-reset').addEventListener('click',function(){map.setView([31.32,120.68],10);currentFilter='all';currentMode='all';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.tab-btn[data-mode="all"]').classList.add('active');document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));document.querySelector('.chip[data-decade="all"]').classList.add('active');renderList();window._currentHeat.remove();heatLayer.addTo(map);window._currentHeat=heatLayer;markerGroup.addTo(map);showHeat=true;showMarkers=true;document.getElementById('btn-heat').classList.add('active');document.getElementById('btn-markers').classList.add('active')});

// Auto play
let autoTimer=null;
const narrativeEl = document.getElementById('narrative');
const narrativeData = [
  {y:1971,era:"1970s",title:"园林外交时代",text:"外国政要到访苏州，第一站总是园林。西哈努克亲王三访苏州，流连拙政园、虎丘；基辛格品尝'火方'；撒切尔穿过月洞门——所有目光聚焦千年古城的风雅。"},
  {y:1992,era:"1990s",title:"转折：李光耀的5小时",text:"1992年，李光耀在火车站前一句'苏州有国际机场吗？'催生了改变城市格局的苏州工业园区。从网师园谈判到竹辉饭店签约，苏州开始从园林走向产业舞台。"},
  {y:2014,era:"2010s",title:"平行双面：园林与工厂",text:"丹麦女王在拙政园品碧螺春，马尔代夫总统考察工业园区——同一年，园林外交与产业外交并行不悖，苏州展示'双面绣'城市魅力。"},
  {y:2024,era:"2020s",title:"直奔工厂时代",text:"西班牙首相直奔昆山车间，德国总理赴太仓看德企——参访目的地从园林转向产业链。APEC会议在金鸡湖畔召开，苏州已成全球产业版图的关键节点。"},
];
let narrativeIdx=0;
function autoPlay(){
  if(!autoTimer) return;
  narrativeIdx = (narrativeIdx+1) % narrativeData.length;
  const n = narrativeData[narrativeIdx];
  const eraVisits = visits.filter(v=>Math.abs(v.y-n.y)<=2);
  if(eraVisits.length){
    highlightVisit(visits.indexOf(eraVisits[0]));
    narrativeEl.innerHTML = `<div class="nt-era">${n.era}</div><div class="nt-title">${n.title}</div><div class="nt-text">${n.text}</div>`;
    narrativeEl.classList.add('show');
    setTimeout(()=>narrativeEl.classList.remove('show'), 5000);
  }
}
document.getElementById('btn-auto').addEventListener('click',function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;this.classList.remove('active');this.textContent='自动播';narrativeEl.classList.remove('show');return;}
  autoTimer=setInterval(autoPlay,6500);
  this.classList.add('active');this.textContent='停止';
  autoPlay();
});

// ========== TREND CHART ==========
function buildTrendChart(filtered){
  const decades = {1970:{cultural:0,mixed:0,business:0},1980:{cultural:0,mixed:0,business:0},1990:{cultural:0,mixed:0,business:0},2000:{cultural:0,mixed:0,business:0},2010:{cultural:0,mixed:0,business:0},2020:{cultural:0,mixed:0,business:0}};
  filtered.forEach(v=>{const d=Math.floor(v.y/10)*10;if(decades[d]) decades[d][v.purpose]++});
  const labels=['1970s','1980s','1990s','2000s','2010s','2020s'];
  const cultural=labels.map(l=>decades[parseInt(l)]['cultural']);
  const mixed=labels.map(l=>decades[parseInt(l)]['mixed']);
  const business=labels.map(l=>decades[parseInt(l)]['business']);
  const maxVal=Math.max(...labels.map(l=>{
    const d=decades[parseInt(l)];return d.cultural+d.mixed+d.business;
  }),1);
  const container=document.getElementById('trendChart');
  container.innerHTML=labels.map((l,i)=>`
    <div class="css-bar-group">
      <div class="css-bar-wrap">
        <div class="css-bar css-bar-cultural" style="height:${(cultural[i]/maxVal*100).toFixed(1)}%"></div>
        <div class="css-bar css-bar-mixed" style="height:${(mixed[i]/maxVal*100).toFixed(1)}%"></div>
        <div class="css-bar css-bar-business" style="height:${(business[i]/maxVal*100).toFixed(1)}%"></div>
      </div>
      <span class="css-bar-label">${l}</span>
    </div>
  `).join('');
  const lastDecade=decades[2020],total=lastDecade.cultural+lastDecade.mixed+lastDecade.business;
  const bizPct=total>0?Math.round(lastDecade.business/total*100):0;
  document.getElementById('insight-pct').textContent=bizPct+'%';
  document.getElementById('insight-text').textContent='2020s产业参访占比';
}
buildTrendChart(visits);

// ========== PLACE TREND ==========
function categorizePlace(placeStr){
  const p = placeStr||'';
  const gardens = ['拙政园','虎丘','留园','网师园','狮子林','沧浪亭','西园','天平山','苏州博物馆','刺绣','戏曲博物馆','丝绸','人民商场','得月楼','山塘街','平江路','周庄'];
  const parks = ['工业园区','园区展示','纳米城','生物医药','生命科学园','绿色数码港','腾飞','研发社区','凤凰工业园'];
  const factories = ['金龙客车','协鑫','固德威','亨通','蒙德拉贡','法格','海斯坦普','史太林格','中交天和','新宇航空','净水厂','同程'];
  for(const k of gardens) if(p.includes(k)) return 'garden';
  for(const k of factories) if(p.includes(k)) return 'factory';
  for(const k of parks) if(p.includes(k)) return 'park';
  return 'other';
}

function buildPlaceTrend(filtered){
  const decades = {1970:{garden:0,park:0,factory:0,other:0},1980:{garden:0,park:0,factory:0,other:0},1990:{garden:0,park:0,factory:0,other:0},2000:{garden:0,park:0,factory:0,other:0},2010:{garden:0,park:0,factory:0,other:0},2020:{garden:0,park:0,factory:0,other:0}};
  filtered.forEach(v=>{
    const d=Math.floor(v.y/10)*10;
    if(decades[d]) decades[d][categorizePlace(v.place)]++;
  });
  const labels=['1970s','1980s','1990s','2000s','2010s','2020s'];
  const colors={garden:'#81c784',park:'#4fc3f7',factory:'#ef5350',other:'#ffb74d'};
  const maxVal=Math.max(...labels.map(l=>{
    const d=decades[parseInt(l)];return d.garden+d.park+d.factory+d.other;
  }),1);
  const container=document.getElementById('pt-chart');
  container.innerHTML=labels.map((l,i)=>{
    const d=decades[parseInt(l)], order=['other','factory','park','garden'];
    let segs='';
    order.forEach(cat=>{
      const h=(d[cat]/maxVal*100).toFixed(1);
      if(parseFloat(h)>0) segs+=`<div style="height:${h}%;width:100%;background:${colors[cat]};border-radius:1px;min-height:2px"></div>`;
    });
    return `<div class="css-bar-group" style="flex:1">
      <div class="css-bar-wrap" style="display:flex;flex-direction:column;justify-content:flex-end;align-items:stretch;height:60px;background:transparent">${segs}</div>
      <span class="css-bar-label">${l}</span>
    </div>`;
  }).join('');
}
buildPlaceTrend(visits);

// ========== CARD LIST ==========
const cardList = document.getElementById('card-list');
let currentFilter='all',currentMode='all';

function renderList(){
  let filtered = visits;
  if(currentFilter!=='all'){const dec=parseInt(currentFilter);filtered=filtered.filter(v=>v.y>=dec&&v.y<dec+10)}
  if(currentMode!=='all') filtered=filtered.filter(v=>v.purpose===currentMode);
  cardList.innerHTML='';
  filtered.forEach(v=>{
    const origIdx=visits.indexOf(v);
    const ds=v.d?`${v.y}/${v.m}/${v.d}`:(v.m?`${v.y}/${v.m}`:`${v.y}`);
    const purposeLabel={cultural:'园林文化',mixed:'混合参访',business:'产业经贸'}[v.purpose];
    const div=document.createElement('div');
    div.className='card';
    let newsHTML='';
    if(v.news&&v.news.length){newsHTML='<div class="card-links">'+v.news.map(n=>n.url?`<a class="card-link" href="${n.url}" target="_blank">📰 ${n.label}</a>`:`<span class="card-link" style="opacity:0.6;cursor:default">📰 ${n.label}</span>`).join('')+'</div>';}
    div.innerHTML=`<div class="card-top"><span class="card-year">${ds}</span><span class="card-purpose ${v.purpose}">${purposeLabel}</span></div><div class="card-name">${v.name}</div><div class="card-detail">${v.cn} · ${v.title}</div><div class="card-detail">📍 ${v.place}</div>${v.note?`<div class="card-detail" style="margin-top:2px;font-style:italic;font-size:10px">${v.note.length>50?v.note.slice(0,50)+'...':v.note}</div>`:''}${newsHTML}`;
    div.addEventListener('click',()=>{highlightVisit(origIdx);if(window.innerWidth<768)document.getElementById('sheet').classList.remove('open')});
    div._origIdx=origIdx;cardList.appendChild(div);
  });
  document.getElementById('s-total').textContent=filtered.length;
  document.getElementById('s-countries').textContent=new Set(filtered.map(v=>v.cn)).size;
  document.getElementById('s-years').textContent=new Set(filtered.map(v=>v.y)).size;
  buildTrendChart(filtered);buildPlaceTrend(filtered);updateHeatmap(filtered);
}

function highlightVisit(idx){
  const v=visits[idx];
  cardList.querySelectorAll('.card').forEach(el=>el.classList.remove('highlight'));
  const target=Array.from(cardList.querySelectorAll('.card')).find(el=>el._origIdx===idx);
  if(target){target.classList.add('highlight');target.scrollIntoView({behavior:'smooth',block:'center'});}
  map.setView([v.lat,v.lng],14,{animate:true});markers[idx].openPopup();
}

// Decade chips
document.getElementById('chip-row').addEventListener('click',function(e){
  if(e.target.classList.contains('chip')){
    document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');currentFilter=e.target.dataset.decade;renderList();
  }
});

// Mode tabs
document.getElementById('tab-row').addEventListener('click',function(e){
  if(e.target.classList.contains('tab-btn')){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');currentMode=e.target.dataset.mode;renderList();
  }
});

// Sheet toggle
document.getElementById('sheet-toggle').addEventListener('click',function(){
  document.getElementById('sheet').classList.toggle('open');
});

// Init
renderList();
document.getElementById('loader').classList.add('hide');
});
</script>
